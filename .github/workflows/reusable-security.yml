# Reusable security workflow for all rwrw01 repositories
# Location: rwrw01/.github/.github/workflows/reusable-security.yml
#
# Provides: CodeQL SAST, dependency review, license compliance

name: "Reusable Security"

on:
  workflow_call:
    inputs:
      codeql-languages:
        description: "Languages for CodeQL analysis"
        type: string
        default: "javascript-typescript"
      fail-on-severity:
        description: "Dependency review fail threshold"
        type: string
        default: "high"
      allow-licenses:
        description: "Comma-separated allowed SPDX license IDs"
        type: string
        default: ""
      deny-licenses:
        description: "Comma-separated denied SPDX license IDs"
        type: string
        default: "GPL-2.0-only,GPL-3.0-only,AGPL-3.0-only"

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.codeql-languages }}
      - uses: github/codeql-action/analyze@v3

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Only runs on PRs — dependency-review-action requires a base to diff against
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          deny-licenses: ${{ inputs.deny-licenses }}

  license-check:
    name: License Compliance (EUPL-1.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify LICENSE file exists
        run: |
          if [ ! -f LICENSE ]; then
            echo "::error::LICENSE file is missing. All rwrw01 repos must include EUPL-1.2 license."
            exit 1
          fi
          if ! grep -qi "EUPL" LICENSE; then
            echo "::warning::LICENSE file does not appear to contain EUPL. Please verify."
          fi
